<svg width="800" height="148" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="148" rx="8" fill="#010409" stroke="#30363d" stroke-width="1"/>
  <rect width="800" height="28" rx="8" fill="#161b22"/>
  <rect y="20" width="800" height="8" fill="#161b22"/>
  <rect x="0" y="27" width="800" height="1" fill="#30363d"/>
  <circle cx="18" cy="14" r="5" fill="#ff5f57"/>
  <circle cx="36" cy="14" r="5" fill="#febc2e"/>
  <circle cx="54" cy="14" r="5" fill="#28c840"/>
  <text x="400" y="19" text-anchor="middle" fill="#8b949e" font-size="11" font-family="Courier New, monospace">terminal</text>

  <defs>
    <clipPath id="c1"><rect x="20" y="43" height="18" width="0"><animate attributeName="width" from="0" to="760" begin="0.3s" dur="0.35s" fill="freeze"/></rect></clipPath>
    <clipPath id="c2"><rect x="20" y="61" height="18" width="0"><animate attributeName="width" from="0" to="760" begin="0.9s" dur="1.1s" fill="freeze"/></rect></clipPath>
    <clipPath id="c3"><rect x="20" y="85" height="18" width="0"><animate attributeName="width" from="0" to="760" begin="2.2s" dur="0.36s" fill="freeze"/></rect></clipPath>
    <clipPath id="c4"><rect x="20" y="103" height="18" width="0"><animate attributeName="width" from="0" to="760" begin="2.8s" dur="1.15s" fill="freeze"/></rect></clipPath>
    <clipPath id="c5"><rect x="20" y="123" height="18" width="0"><animate attributeName="width" from="0" to="760" begin="4.15s" dur="0.12s" fill="freeze"/></rect></clipPath>
  </defs>

  <g clip-path="url(#c1)">
    <text x="20" y="56" fill="#58a6ff" font-size="13" font-family="Courier New, monospace">~ $</text>
    <text x="50" y="56" fill="#e6edf3" font-size="13" font-family="Courier New, monospace">whoami</text>
  </g>

  <g clip-path="url(#c2)">
    <text x="20" y="74" fill="#3fb950" font-size="13" font-family="Courier New, monospace">&gt;</text>
    <text x="36" y="74" fill="#8b949e" font-size="13" font-family="Courier New, monospace">Developer | .NET + React</text>
  </g>

  <g clip-path="url(#c3)">
    <text x="20" y="98" fill="#58a6ff" font-size="13" font-family="Courier New, monospace">~ $</text>
    <text x="50" y="98" fill="#e6edf3" font-size="13" font-family="Courier New, monospace">open_to</text>
  </g>

  <g clip-path="url(#c4)">
    <text x="20" y="116" fill="#3fb950" font-size="13" font-family="Courier New, monospace">&gt;</text>
    <text x="36" y="116" fill="#8b949e" font-size="13" font-family="Courier New, monospace">Junior / full-stack roles · Taichung</text>
  </g>

  <g clip-path="url(#c5)">
    <text x="20" y="136" fill="#58a6ff" font-size="13" font-family="Courier New, monospace">~ $</text>
  </g>

  <rect x="50" y="124" width="8" height="14" fill="#58a6ff" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="4.27s" dur="0.05s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1" begin="4.32s" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
